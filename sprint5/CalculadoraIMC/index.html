<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC - Sprint 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
</head>
<body>
    <div class="imc-container">
        <header>
            <h1>✨ Calculadora - IMC</h1>
        </header>
        <form id="imc-form">
            <div class="form-inputs">
                <div class="input-group">
                    <label for="height">Altura (m)</label>
                    <input type="number" id="height" step="0.01" placeholder="Ex: 1.65" required>
                </div>
                <div class="input-group">
                    <label for="weight">Peso (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="Ex: 60.5" required>
                </div>
            </div>
            <div class="action-buttons">
                <button type="submit" id="calc-btn" class="btn-calc">Calcular</button>
                <button type="button" id="clear-btn" class="btn-clear">Limpar</button>
            </div>
        </form>
        <div id="result-container" class="hide">
            <p id="imc-number"></p>
            <p id="imc-info"></p>
            <button id="back-btn" class="btn-back">Voltar</button>
        </div>
    </div>
</body>
</html>
