<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas - Sprint 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css" integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
</head>
<body>
    <div class="todo-container">
        <header>
            <h1>✨ Minhas Tarefas</h1>
        </header>
        
        <form id="todo-form">
            <p>O que vamos fazer hoje?</p>
            <div class="form-control">
                <input type="text" id="todo-input" placeholder="Digite uma nova tarefa...">
                <button type="submit" class="btn-add">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </form>

        <form id="edit-form" class="hide">
            <p>Ajustando os detalhes:</p>
            <div class="form-control">
                <input type="text" id="edit-input">
                <button type="submit" class="btn-confirm">
                    <i class="fa-solid fa-check"></i>
                </button>
            </div>
            <button id="cancel-edit-btn" class="btn-cancel">Voltar</button>
        </form>

        <div id="todo-list">
        </div>
    </div>
</body>
</html>
